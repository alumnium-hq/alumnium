
[tools]
python = "3.10"
uv = "latest"

[settings]
python.uv_venv_auto = "source"

[env]
_.python.venv = { create = true, path = '.venv' }

[tasks.install]
run = "uv sync"
depends = ["//:install", "//packages/typescript:build"]

[tasks.clean]
run = "rm -rf .alumnium dist log reports .pytest_cache __pycache__ .ruff_cache htmlcov .coverage coverage.xml"

[tasks.test]
run = [
  { task = "test/unit" },
  { task = "test/system:all" }
]

[tasks."test/unit"]
run = "pytest --cov=alumnium --cov-report=html --cov-report=xml tests/"
depends = "install"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright" "appium-ios" "appium-android"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} ./scripts/test-system.sh"
depends = "install"

[tasks."test/system:all"]
run = [
  { task = "test/system:selenium" },
  { task = "test/system:playwright" },
  { task = "test/system:appium-ios" },
  { task = "test/system:appium-android" },
]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:appium-ios"]
run = [{ task = "test/system appium-ios" }]

[tasks."test/system:appium-android"]
run = [{ task = "test/system appium-android" }]

[tasks."test/system/upload/android-app"]
run = "fnox exec -- curl -u $LT_USERNAME:$LT_ACCESS_KEY -X POST https://manual-api.lambdatest.com/app/upload/realDevice -F appFile=@examples/behave/features/support/TodoList.apk -F name=AndroidToDoApp"
depends = "install"

[tasks."test/system/upload/ios-app"]
run = "fnox exec -- curl -u $LT_USERNAME:$LT_ACCESS_KEY -X POST https://manual-api.lambdatest.com/app/upload/realDevice -F appFile=@examples/behave/features/support/TodoList.ipa -F name=TodoList"
depends = "install"

[tasks.lint]
run = "ruff check ."
depends = "install"

[tasks."lint:fix"]
run = "ruff check --fix ."
depends = "install"

[tasks.format]
run = [
  { task = "format/pyproject" },
  { task = "format/code" },
]

[tasks."format:check"]
run = [
  { task = "format/pyproject:check" },
  { task = "format/code:check" },
]

[tasks."format/pyproject"]
run = "pyprojectsort"
depends = "install"

[tasks."format/pyproject:check"]
run = "pyprojectsort --diff"
depends = "install"

[tasks."format/code"]
run = "ruff format ."
depends = "install"

[tasks."format/code:check"]
run = "ruff format . --check"
depends = "install"

[tasks.types]
run = "uv run ty check"
depends = "install"

[tasks."types:watch"]
run = "uv run ty check --watch"
depends = "install"
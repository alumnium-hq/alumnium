plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id 'signing'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

ext {
    jacksonVersion = '2.18.2'
    seleniumVersion = '4.27.0'
    playwrightVersion = '1.49.0'
    appiumVersion = '9.3.0'
    junitVersion = '5.11.4'
    assertjVersion = '3.26.3'
    slf4jVersion = '2.0.16'
}

dependencies {
    // JSON
    api "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    api "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${jacksonVersion}"

    // Logging facade; consumers may bring their own SLF4J binding
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"

    // Driver dependencies (compile-only so consumers bring their own transitive versions)
    compileOnly "org.seleniumhq.selenium:selenium-java:${seleniumVersion}"
    compileOnly "com.microsoft.playwright:playwright:${playwrightVersion}"
    compileOnly "io.appium:java-client:${appiumVersion}"

    // Testing
    testImplementation "org.junit.jupiter:junit-jupiter:${junitVersion}"
    testImplementation "org.assertj:assertj-core:${assertjVersion}"
    testImplementation "org.seleniumhq.selenium:selenium-java:${seleniumVersion}"
    testImplementation "com.microsoft.playwright:playwright:${playwrightVersion}"
    testImplementation "io.appium:java-client:${appiumVersion}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
    testRuntimeOnly "org.slf4j:slf4j-simple:${slf4jVersion}"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.addAll(['-Xlint:all', '-Xlint:-serial', '-parameters'])
}

testing {
    suites {
        test {
            useJUnitJupiter() 
            targets {
                all {
                    testTask.configure {
                        testLogging {
                            events 'passed', 'skipped', 'failed'
                        }
                    }
                }
            }
        }
    }
}

publishing {
    publications {
        main(MavenPublication) {
            from components.java
            artifactId = 'alumnium'
            pom {
                name = 'Alumnium'
                description = 'AI-powered test automation framework (Java client).'
                url = 'https://alumnium.ai'
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                developers {
                    developer { id = 'p0deje'; name = 'Alex Rodionov' }
                    developer { id = 'koss';   name = 'Sasha Koss' }
                    developer { id = 'rookieintraing';   name = 'Ish Abbi' }
                }
                scm {
                    url = 'https://github.com/alumnium-hq/alumnium'
                    connection = 'scm:git:https://github.com/alumnium-hq/alumnium.git'
                    developerConnection = 'scm:git:ssh://git@github.com/alumnium-hq/alumnium.git'
                }
            }
        }
    }

    repositories {
        maven {
            name = 'localStaging'
            url = layout.buildDirectory.dir('staging-deploy')
        }
    }
}

signing {
    required = { gradle.taskGraph.hasTask('publish') && !version.toString().endsWith('SNAPSHOT') }
    sign publishing.publications
}

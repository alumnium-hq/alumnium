[tools]
java = "21"

[tasks.install]
run = "./gradlew --no-daemon dependencies -q || true"

[tasks."install/playwright"]
run = "./gradlew --no-daemon installPlaywright"
# NOTE: It prompts for sudo to install OS dependencies
raw = true

[tasks.compile]
run = "./gradlew --no-daemon compileJava"

[tasks.build]
run = "./gradlew --no-daemon build -x test"
description = "Build main Java artifact"

[tasks.lint]
run = "./gradlew --no-daemon check -x test"

[tasks.format]
run = "./gradlew clean --no-daemon spotlessApply"
description = "Apply Spotless formatting to Java and Gradle sources"

[tasks.types]
run = "./gradlew --no-daemon compileJava compileTestJava"

[tasks."format/check"]
run = "./gradlew clean --no-daemon spotlessCheck"
description = "Verify Spotless formatting (CI-style)"

[tasks."publish/local"]
run = "./gradlew --no-daemon publishToMavenLocal"
description = "Publish main + classifier jars to local Maven repository"

[tasks.publish]
run = "./gradlew --no-daemon publishAndReleaseToMavenCentral --no-configuration-cache"
description = "Publish main + CLI artifacts to Maven Central (auto-release)"

[tasks."test/unit"]
run = "./gradlew clean --no-daemon test --tests 'ai.alumnium.unit.*'"
description = "Run unit tests"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} ./gradlew clean --no-daemon test --tests 'ai.alumnium.system.*'"

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

[tasks."test/package"]
run = "./scripts/test-package.sh"
description = "Test Maven package installation and CLI binary auto-start"

[tools]
java = "21"

[tasks."install/playwright"]
run = "./gradlew installPlaywright"
# NOTE: It prompts for sudo to install OS dependencies
raw = true

[tasks.build]
run = "./gradlew build -x test"
description = "Build main Java artifact"

[tasks.lint]
run = "./gradlew check -x test"

[tasks.format]
run = "./gradlew clean spotlessApply"
description = "Apply Spotless formatting to Java and Gradle sources"

[tasks.types]
run = "./gradlew compileJava compileTestJava"
description = "Check Java types correctness (compilation)"

[tasks."format/check"]
run = "./gradlew clean spotlessCheck"
description = "Verify Spotless formatting (CI-style)"

[tasks."publish/local"]
run = "./gradlew publishToMavenLocal"
description = "Publish main + classifier jars to local Maven repository"

[tasks.publish]
run = "./gradlew publishAndReleaseToMavenCentral --no-configuration-cache"
description = "Publish main + CLI artifacts to Maven Central (auto-release)"

[tasks."test/unit"]
run = "./gradlew clean test --tests 'ai.alumnium.unit.*'"
description = "Run unit tests"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright" "appium-ios" "appium-android"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} ./gradlew clean test --tests 'ai.alumnium.system.*'"

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

[tasks."test/system:appium-ios"]
run = [{ task = "test/system appium-ios" }]

[tasks."test/system:appium-android"]
run = [{ task = "test/system appium-android" }]

[tasks."test/package"]
run = "./scripts/test-package.sh"
description = "Test Maven package installation and CLI binary auto-start"

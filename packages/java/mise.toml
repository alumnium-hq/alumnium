[tools]
java = "21"
gradle = "8.11.1"

[tasks.install]
run = "gradle --no-daemon dependencies -q || true"

[tasks.compile]
run = "gradle --no-daemon compileJava"

[tasks.build]
run = "gradle --no-daemon build -x test"
description = "Build main Java artifact"

[tasks.lint]
run = "gradle --no-daemon check -x test"

[tasks.format]
run = "gradle clean --no-daemon spotlessApply"
description = "Apply Spotless formatting to Java sources"

[tasks.types]
run = "gradle --no-daemon compileJava compileTestJava"

[tasks."format:check"]
run = "gradle clean --no-daemon spotlessCheck"
description = "Verify Spotless formatting (CI-style)"

[tasks.local_lib]
run = "gradle --no-daemon publishToMavenLocal"
description = "Publish main + classifier jars to local Maven repository"

[tasks."test/unit"]
run = "gradle clean --no-daemon test --tests 'ai.alumnium.unit.*'"
description = "Run unit tests"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} gradle clean --no-daemon test --tests 'ai.alumnium.system.*'"

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

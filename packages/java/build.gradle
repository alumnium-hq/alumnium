plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id 'com.vanniktech.maven.publish' version '0.30.0'
    id 'com.diffplug.spotless' version '8.5.1'
}

group   = 'ai.alumnium'
version = '0.21.0-alpha.5'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

spotless {
    java {
        target 'src/**/*.java', 'test/**/*.java'

        importOrder()
        forbidWildcardImports()
        googleJavaFormat()
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }

    groovyGradle {
        target '*.gradle'
        greclipse()
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
        endWithNewline()
    }
}

ext {
    jacksonVersion = '2.18.2'
    seleniumVersion = '4.27.0'
    playwrightVersion = '1.60.0'
    appiumVersion = '9.3.0'
    junitVersion = '5.11.4'
    assertjVersion = '3.26.3'
    slf4jVersion = '2.0.16'
}

dependencies {
    // JSON
    api "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    api "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${jacksonVersion}"

    // Logging facade; consumers may bring their own SLF4J binding
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"

    // Driver dependencies exposed transitively so consumers don't need to add
    // all three to satisfy bytecode verification of Alumni's overloaded
    // constructors. Consumers can override versions via dependency resolution.
    api "org.seleniumhq.selenium:selenium-java:${seleniumVersion}"
    api "com.microsoft.playwright:playwright:${playwrightVersion}"
    api "io.appium:java-client:${appiumVersion}"

    // Testing
    testImplementation "org.junit.jupiter:junit-jupiter:${junitVersion}"
    testImplementation "org.assertj:assertj-core:${assertjVersion}"
    testImplementation "org.seleniumhq.selenium:selenium-java:${seleniumVersion}"
    testImplementation "com.microsoft.playwright:playwright:${playwrightVersion}"
    testImplementation "io.appium:java-client:${appiumVersion}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
    testRuntimeOnly "org.slf4j:slf4j-simple:${slf4jVersion}"
    testRuntimeOnly files({
        def mavenDir = file("${rootProject.projectDir}/../typescript/dist/maven")
        mavenDir.listFiles()?.findAll { it.name.endsWith('.jar') } ?: []
    })
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.addAll([
        '-Xlint:all',
        '-Xlint:-serial',
        '-parameters'
    ])
}

testing {
    suites {
        test {
            useJUnitJupiter()
            targets {
                all {
                    testTask.configure {
                        environment System.getenv()
                        environment "ALUMNIUM_DRIVER", System.getenv("ALUMNIUM_DRIVER") ?: "selenium"
                        environment "ALUMNIUM_PLAYWRIGHT_HEADLESS", System.getenv("ALUMNIUM_PLAYWRIGHT_HEADLESS") ?: "true"
                        testLogging {
                            events 'passed', 'skipped', 'failed'
                        }
                    }
                }
            }
        }
    }
}

mavenPublishing {
    publishToMavenCentral(com.vanniktech.maven.publish.SonatypeHost.CENTRAL_PORTAL, true)
    signAllPublications()

    coordinates('ai.alumnium', 'alumnium', project.version.toString())

    pom {
        name = 'Alumnium'
        description = 'End-to-end testing with AI.'
        url = 'https://alumnium.ai'
        licenses {
            license {
                name = 'MIT License'
                url = 'https://opensource.org/licenses/MIT'
            }
        }
        developers {
            developer {
                id = 'p0deje'
                name = 'Alex Rodionov'
            }
            developer {
                id = 'rookieintraining'
                name = 'Ish Abbi'
            }
        }
        scm {
            url = 'https://github.com/alumnium-hq/alumnium'
            connection = 'scm:git:https://github.com/alumnium-hq/alumnium.git'
            developerConnection = 'scm:git:ssh://git@github.com/alumnium-hq/alumnium.git'
        }
    }
}

// Skip signing when GPG credentials aren't provided (e.g. publishToMavenLocal
// during smoke tests). Maven Central publish always has the key set.
def signingKey = providers.gradleProperty('signingInMemoryKey')
tasks.withType(Sign).configureEach {
    onlyIf { signingKey.isPresent() }
}

def cliPlatforms = [
    'darwin-arm64',
    'darwin-x64',
    'linux-arm64',
    'linux-x64',
    'windows-arm64',
    'windows-x64'
]
def tsMavenDir = file("${rootProject.projectDir}/../typescript/dist/maven")

publishing {
    publications {
        cliPlatforms.each { platform ->
            def safe = platform.replace('-', '_')
            // Per-platform empty source/javadoc jars: sharing across publications
            // causes sign tasks to produce the same .asc path, which Gradle flags
            // as an implicit cross-task dependency.
            def sourcesJarTask = tasks.register("emptyCliSourcesJar_${safe}", Jar) {
                archiveBaseName = "alumnium-cli-${platform}"
                archiveClassifier = 'sources'
            }
            def javadocJarTask = tasks.register("emptyCliJavadocJar_${safe}", Jar) {
                archiveBaseName = "alumnium-cli-${platform}"
                archiveClassifier = 'javadoc'
            }

            "cli_${safe}"(MavenPublication) {
                groupId = 'ai.alumnium'
                artifactId = "alumnium-cli-${platform}"
                version = project.version

                artifact("${tsMavenDir}/alumnium-cli-${platform}-${project.version}.jar")
                artifact(sourcesJarTask)
                artifact(javadocJarTask)

                pom {
                    name = "Alumnium CLI (${platform})"
                    description = "Platform-specific Alumnium CLI binary for ${platform}."
                }
            }
        }
    }
}

tasks.register('installPlaywright', JavaExec) {
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.microsoft.playwright.CLI'
    args = [
        'install',
        'chromium',
        '--with-deps'
    ]
}

tasks.register('copyDriverScripts', Copy) {
    from "${rootProject.projectDir}/../python/src/alumnium/drivers/scripts"
    include '*.js'
    into layout.buildDirectory.dir('resources/main/ai/alumnium/driver/scripts')
}

tasks.named('processResources') {
    dependsOn copyDriverScripts
}

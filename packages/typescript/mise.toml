[tasks.install]
run = []


[tasks."install/playwright"]
run = "bun run playwright install chromium --with-deps"
# NOTE: It prompts for sudo to install OS dependencies
raw = true

[tasks.clean]
run = "rm -rf .alumnium dist"

[tasks.build]
run = "./scripts/build.ts"
description = "Build CLI bins, core npm and CLI pip packages"
depends = ["build/generate"]
sources = [
  "src/**/*",
  "scripts/build.ts",
  "package.json",
  "tsconfig.json",
  "tsconfig.build.json",
  "*.md",
]
outputs = ["dist/**/*"]

[tasks."build/generate"]
run = { task = "build/generate:bundles" }

[tasks."build/generate:bundles"]
run = "./scripts/generate-bundles.ts | xargs oxfmt"
description = "Generates code bundles to enable building single-file executable"
sources = [
  "scripts/generate-bundles.ts",
  # TODO: Move prompts generation into the script
  "src/server/agents/prompts/prompts.ts",
  "src/drivers/scripts/*.js",
  "src/server/agents/prompts/**/*.md",
]
outputs = [
  "src/server/agents/prompts/bundledPrompts.ts",
  "src/drivers/scripts/bundledScripts.ts",
]

[tasks.publish]
run = "./scripts/publish.sh"
depends = "build"

[tasks."dev/cli"]
run = "fnox exec  -- bun ./src/cli/bin.ts"
quiet = true
raw = true

[tasks."dev/server"]
run = "fnox exec  -- bun ./src/cli/bin.ts server"
quiet = true
raw = true

[tasks."dev/mcp"]
run = "fnox exec  -- bun ./src/cli/bin.ts mcp"
quiet = true
raw = true

[tasks."dev/mcp:inspect"]
run = "fnox exec  -- ALUMNIUM_LOG_FILENAME=mcp-inspect.log bunx @modelcontextprotocol/inspector bun ./src/cli/bin.ts mcp"

[tasks.test]
run = [{ task = "test/unit" }, { task = "test/system:all" }]

[tasks."test/unit"]
run = "bun vitest --project unit run"

[tasks."test/unit:watch"]
run = "bun vitest --project unit"

[tasks."test/unit:coverage"]
run = "bun vitest --project unit --coverage --coverage.reportsDirectory tests/artifacts/coverage/ run"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright" "appium-ios" "appium-android"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} ./scripts/test-system.sh"

[tasks."test/system:all"]
run = [
  { task = "test/system:selenium" },
  { task = "test/system:playwright" },
  { task = "test/system:appium-ios" },
  { task = "test/system:appium-android" },
]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:appium-ios"]
run = [{ task = "test/system appium-ios" }]

[tasks."test/system:appium-android"]
run = [{ task = "test/system appium-android" }]

[tasks."test/npm"]
run = "./scripts/test-npm.sh"

[tasks.lint]
run = "bun oxlint ."

[tasks."lint:fix"]
run = "bun oxlint --fix ."

[tasks.format]
run = "bun oxfmt ."

[tasks."format:check"]
run = "bun oxfmt . --check"

[tasks.types]
depends = "//:types/ts"

[tasks."types:watch"]
depends = "//:types/ts:watch"

[tasks.version]
run = "./scripts/version.ts"
quiet = true
raw = true

name: TypeScript
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string

env:
  ALUMNIUM_LOG_LEVEL: debug
  ALUMNIUM_LOG_PATH: alumnium.log
  ALUMNIUM_PLAYWRIGHT_HEADLESS: false
  DISPLAY: :99
  LT_USERNAME: ${{ secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  examples:
    name: Examples
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALUMNIUM_MODEL: ${{ matrix.model }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - driver: appium
            model: azure_openai
          - driver: playwright
            model: azure_openai
          - driver: playwright
            model: google
          - driver: selenium
            model: azure_openai

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - uses: oven-sh/setup-bun@v2

      - if: matrix.driver != 'appium'
        run: Xvfb ${{ env.DISPLAY }} -screen 0 1600x1200x24 &

      - uses: actions/cache@v4
        with:
          path: .alumnium/cache/
          key: alumnium-cache-v2-typescript-${{ matrix.driver }}-${{ matrix.model }}-${{ github.sha }}
          restore-keys: alumnium-cache-v2-typescript-${{ matrix.driver }}-${{ matrix.model }}-

      - run: bun install

      - if: matrix.driver == 'playwright'
        run: bunx playwright install chromium

      - run: cd packages/typescript && bun run test:system:${{ matrix.driver }}

      - if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-typescript-${{ matrix.driver }}-${{ matrix.model }}
          path: |
            packages/typescript/*.log
            packages/typescript/playwright-report/
            packages/typescript/test-results/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: examples

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build core binaries
        run: cd packages/typescript && bun run build:binaries

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: packages/typescript/dist/bin/*

      - if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3

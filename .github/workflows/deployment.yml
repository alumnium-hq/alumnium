name: Deployment
on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.20.0-alpha.11). Defaults to latest.
        required: false

env:
  ALUMNIUM_VERSION: ${{ github.event.release.tag_name || inputs.version }}

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - run: mise //websites/docs:install
      - run: mise //websites/docs:build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: websites/docs/dist/

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: release
    environment:
      name: release
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment

name: Release
on:
  workflow_dispatch:
    inputs:
      docker:
        description: Build and push Docker image
        type: boolean
        default: true
      python:
        description: Publish pip packages
        type: boolean
        default: true
      typescript:
        description: Publish npm packages
        type: boolean
        default: true
      release:
        description: Create GitHub release
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    if: inputs.python
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set Up Dev Env
        uses: ./.github/actions/setup
        with:
          python-cache: true

      - name: Build Dist
        run: mise //packages/typescript:build

      - name: Build Main Package
        run: mise //packages/python:build

      - name: Publish CLI Pip Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/typescript/dist/pip/

      - name: Publish Main Package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/

      - name: Debug Session
        if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

  typescript:
    name: TypeScript
    if: inputs.typescript
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set Up Dev Env
        uses: ./.github/actions/setup

      - name: Build Dist
        run: mise //packages/typescript:build

      - name: Authenticate npm
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm Packages
        run: mise //packages/typescript:publish

      - name: Debug Session
        if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

  docker:
    name: Docker
    if: inputs.docker
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set Up Dev Env
        uses: ./.github/actions/setup

      - name: Build Dist
        run: mise //packages/typescript:build

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Version
        id: version
        run: echo "version=$(mise //packages/typescript:version)" >> $GITHUB_OUTPUT

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: alumnium/alumnium
          tags: |
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}

      - name: Build and Push
        id: push
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          build-args: VERSION=${{ steps.version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/alumnium/alumnium
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Debug Session
        if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

  release:
    name: GitHub Release
    if: inputs.release
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: packages/typescript
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set Up Dev Env
        uses: ./.github/actions/setup
        with:
          python-cache: true

      - name: Build Dist
        run: mise //packages/typescript:build

      - name: Build Main pip Package
        run: mise //packages/python:build

      - name: Attest Release Files
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: |
            packages/typescript/dist/bin/*
            packages/typescript/dist/npm/*
            packages/python/dist/*
            packages/typescript/dist/pip/*

      - name: Get Version
        id: version
        run: echo "version=$(mise //packages/typescript:version)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: >
          gh release create ${{ steps.version.outputs.version }} --generate-notes
          ${{ contains(steps.version.outputs.version, 'alpha') && '--prerelease' }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Release Files
        run: |
          gh release upload ${{ steps.version.outputs.version }} \
            packages/typescript/dist/bin/* \
            packages/typescript/dist/pip/* \
            packages/typescript/dist/npm/* \
            packages/python/dist/* \
            "${{ steps.attest.outputs.bundle-path }}" \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Release Artifacts
        if: always()
        uses: ./.github/actions/dist-artifacts
        with:
          name: release
          npm: true
          pip: true
          bin: true
          attest-bundle-path: ${{ steps.attest.outputs.bundle-path }}

      - name: Debug Session
        if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

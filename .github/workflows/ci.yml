  examples-ts:
    name: packages/typescript / examples
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALUMNIUM_DRIVER: ${{ matrix.driver }}
      ALUMNIUM_MODEL: ${{ matrix.model }}
      ALUMNIUM_LOG_LEVEL: debug
      ALUMNIUM_LOG_PATH: alumnium.log
      ALUMNIUM_PLAYWRIGHT_HEADLESS: false
      DISPLAY: :99
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    defaults:
      run:
        working-directory: packages/typescript
    strategy:
      fail-fast: false
      matrix:
        driver:
          # - mocha
          - playwright
          # - wdio
        model:
          # - anthropic
          # - aws_anthropic
          # - aws_meta
          - azure_openai
          # Official DeepSeek platform times out!
          # - deepseek
          # - google
          # - mistralai
          # - openai
    steps:
      - id: check-access
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}
      - if: steps.check-access.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo - maintainer will re-run this job."
          echo "Current permission level is ${{ steps.check-access.outputs.user-permission }}."
          echo "Job originally triggered by ${{ github.actor }}."
          exit 1
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json
          node-version-file: .tool-versions
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          load: true
          tags: alumnium-server
      - if: matrix.driver != 'appium'
        run: Xvfb ${{ env.DISPLAY }} -screen 0 1600x1200x24 &
      - uses: actions/cache@v4
        with:
          path: .alumnium/cache/
          key: alumnium-cache-typescript-${{ matrix.driver }}-${{ matrix.model }}-${{ github.sha }}
          restore-keys: alumnium-cache-typescript-${{ matrix.driver }}-${{ matrix.model }}-
      - run: |
          mkdir -p log &&
          docker run --detach --rm -ti -p 8013:8013 \
            -v .alumnium/cache:/app/.alumnium/cache \
            -v log:/app/log \
            -e ALUMNIUM_LOG_LEVEL \
            -e ALUMNIUM_LOG_PATH=log/alumnium-server.log \
            -e ALUMNIUM_MODEL \
            -e ANTHROPIC_API_KEY \
            -e AWS_ACCESS_KEY \
            -e AWS_SECRET_KEY \
            -e AZURE_OPENAI_API_KEY \
            -e AZURE_OPENAI_API_VERSION \
            -e AZURE_OPENAI_ENDPOINT \
            -e DEEPSEEK_API_KEY \
            -e GOOGLE_API_KEY \
            -e MISTRAL_API_KEY \
            -e OPENAI_API_KEY \
            alumnium-server
        working-directory: .
      - run: npm install
      - if: matrix.driver == 'playwright'
        run: npx playwright install chromium
      - run: npm run examples:${{ matrix.driver }}
      - if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.driver }}-${{ matrix.model }}
          path: |
            log/*.log
            packages/typescript/*.log
            packages/typescript/playwright-report/
            packages/typescript/test-results/


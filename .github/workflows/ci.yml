name: CI
on:
  pull_request_target:
  push:
    branches:
      - main
      # TODO: Disable before merging the branch
      - ts
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      permitted: ${{ steps.check-access.outputs.require-result }}
      python-changed: ${{ steps.changed-files.outputs.python_any_changed }}
      typescript-changed: ${{ steps.changed-files.outputs.typescript_any_changed }}

    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set Up Dev Env
        uses: ./.github/actions/setup
        with:
          python-cache: true

      - name: Check Access
        id: check-access
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}

      - name: Determine Changed Files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files_yaml: |
            python:
              - packages/python/**
            typescript:
              - packages/typescript/**

      - name: Check Formatting
        run: mise :format:check

      - name: Check Types
        run: mise :types

      - name: Unit Tests
        run: mise :test/unit

      - name: Build Dist
        run: mise //packages/typescript:build

      - name: Upload Dist
        if: always() && hashFiles('packages/typescript/dist/**') != ''
        uses: actions/cache/save@v5
        with:
          path: packages/typescript/dist
          key: typescript-dist-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Upload Test Artifacts
        if: always()
        uses: ./.github/actions/test-artifacts
        with:
          name: ci
          typescript: true
          python: true

      - name: Run Post-Setup
        if: always()
        uses: ./.github/actions/setup/post

      - name: Debug Session
        if: failure() && runner.debug == '1'
        uses: mxschmitt/action-tmate@v3

  python:
    name: Python
    needs: test
    secrets: inherit
    # TODO: Re-enable after fixing GitHub Actions
    # if: >
    #   needs.test.outputs.permitted == 'true'
    #     && (needs.test.outputs.typescript-changed == 'true' || needs.test.outputs.python-changed == 'true')
    uses: ./.github/workflows/ci-python.yml
    with:
      sha: ${{ github.event.pull_request.head.sha || github.sha }}

  typescript:
    name: TypeScript
    needs: test
    secrets: inherit
    # TODO: Re-enable after fixing GitHub Actions
    # if: >
    #   needs.test.outputs.permitted == 'true'
    #     && needs.test.outputs.typescript-changed == 'true'
    uses: ./.github/workflows/ci-typescript.yml
    with:
      sha: ${{ github.event.pull_request.head.sha || github.sha }}

  binaries:
    name: Binaries
    needs: test
    # TODO: Re-enable after fixing GitHub Actions
    # if: >
    #   needs.test.outputs.permitted == 'true'
    #     && needs.test.outputs.typescript-changed == 'true'
    uses: ./.github/workflows/ci-binaries.yml
    with:
      sha: ${{ github.event.pull_request.head.sha || github.sha }}

experimental_monorepo_root = true
[monorepo]
config_roots = [".", "packages/*"]

[tools]
# TypeScript
bun = "latest"

# Python
python = "3.10"
uv = "latest"

# Tools
fnox = "latest" # Secrets manager
opencode = "latest" # AI agent
claude = "latest" # AI agent
ruff = "latest" # Python formatter
shfmt = "latest" # .sh formatter
oxfmt = "latest" # TS formatter
"pipx:pyprojectsort" = "latest" # pyproject.toml formatter

[env]
_.source = "scripts/env.sh"
# Alumnium envs
ALUMNIUM_LOG_LEVEL = "${ALUMNIUM_LOG_LEVEL:-debug}"
ALUMNIUM_MODEL = "${ALUMNIUM_MODEL:-azure_openai}"
ALUMNIUM_PLAYWRIGHT_NEW_TAB_TIMEOUT = "2000"
AZURE_OPENAI_API_VERSION = "${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}"
# Tool envs
MISE_EXPERIMENTAL = true # Enable monorepo root support
OPENCODE_CONFIG_DIR = "./.agents"
FORCE_COLOR = "1" # Force colors, i.e., for `bun --filter test`

[settings]
env_shell_expand = true # Allow using "${VAR}" in values
lockfile = true
idiomatic_version_file_enable_tools = ["node", "bun", "potery", "python"]

[tasks.install]
run = [
  { task = "install/mise" },
  { task = "install/bun" },
]

[tasks."install/mise"]
run = "mise install"

[tasks."install/bun"]
run = "bun install"
# NOTE: No need to specify sources and outputs as `bun install` is faster at tracking them than mise.
depends = "install/mise"

[tasks."dev:mcp"]
run = "fnox exec --if-missing error -- bun ./packages/typescript/src/cli/bin.ts mcp"
quiet = true
raw = true
depends = "install"

[tasks."dev/mcp:inspect"]
run = "cd packages/typescript && fnox exec --if-missing error -- ALUMNIUM_LOG_FILENAME=mcp-inspect.log bunx @modelcontextprotocol/inspector bun ./src/cli/bin.ts mcp"
depends = "install"

[tasks."dev/server/start"]
run = "fnox exec --if-missing error -- bun ./packages/typescript/src/cli/bin.ts server"
depends = "install"

[tasks."clean"]
run = "rm -rf ./.alumnium"

[tasks."types/ts"]
run = "bun run tsgo --build"
depends = "install"

[tasks."types/ts:watch"]
run = "bun run tsgo --build --watch"
depends = "install"